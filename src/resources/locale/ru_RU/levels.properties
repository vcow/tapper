# Levels

level0.description=Ты уличный еврей.
level1.description=Ты воруешь деньги\nу котов и собак.
level2.description=Твои навыки поражают\nвсю твою семью.
level3.description=Ты воруешь деньги\nу местных политиков.
level4.description=Ты начал "Курс Юного Еврея".
level5.description=Ой-вэй! Ты воруешь деньги\nуже у королей и Путина.
level6.description=Ты чувстсвуешь, как все\nзавидуют твоим скиллам жида.
level7.description=Ты превзошел собственного Батю.
level8.description=Все жиды завидуют\nтвоим шекелям.
level9.description=Люди прилетают из других\nгалактик, чтобы посмотреть\nна твои шекели.
level10.description=Количество твоих шекелей\nрастет каждую секунду.
level11.description=Ты перестал есть нормальную\nеду, ты теперь ешь\nтолько шекели.
level12.description=99% твоего тела состоит\nиз шекелей.
level13.description=Мир погряз в твоих шекелях.
level14.description=Всё в солнечной системе\nсостоит из твоих шекелей.
level15.description=Ты теперь стал СУПЕР ЖИДОМ.
level16.description=О боже, ты уже заменил свои\nглаза и нос на деньги.
level17.description=Ты перестал быть человеком,\nты стал одним целым с шекелем.
level18.description=Пора перестать жидовать...
